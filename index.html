<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>徘徊俱乐部</title>
  <meta name="description" content="记录我想记录的快乐,分享大家喜欢的技术与体验">
  <link rel="stylesheet" href="styles.css">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="徘徊俱乐部">
  <meta property="og:description" content="记录我想记录的快乐,分享大家喜欢的技术与体验">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="徘徊俱乐部">
  <meta property="twitter:description" content="记录我想记录的快乐,分享大家喜欢的技术与体验">
  
  <style>
    /* 基础样式重置 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: black;
      min-height: 100vh;
    }

    
    /* 导航栏样式 */
    .navbar {
      padding: 1.5rem 0;
      transition: all 0.3s ease;
      position:fixed;
      top:0;
      left:0 ;
      z-index: 1000;
    }
    
    .navbar-sticky {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(124, 77, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 1rem 0;
      box-shadow: 0 2px 20px rgba(124, 77, 255, 0.3);
    }

    .navbar-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }
    
    .navbar-brand {
      font-size: 1.5rem;
      font-weight: 600;
    }
    
    .brand-link {
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
      font-family: serif;
      letter-spacing: 0.1rem;
    }
    
    .brand-link:hover {
      color: rgba(255, 255, 255, 0.9);
      transform: translateY(-1px);
    }

    .navbar-links {
      display: flex;
      gap: 2rem;
    }

    .navbar-link {
      color: white;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 400;
      transition: all 0.3s ease;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      position: relative;
      overflow: hidden;
    }
    
    .navbar-link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      transition: left 0.6s ease;
    }

    .navbar-link:hover {
      color: white;
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    
    .navbar-link:hover::before {
      left: 100%;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .navbar-content {
        flex-direction: column;
        gap: 1rem;
      }
      
      .navbar-links {
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      
      .navbar-sticky {
        padding: 0.8rem 0;
      }
    }
  

    /* 主标题区域 */
    .hero-section {
      text-align: center;
      padding: 5rem 0 6rem 0;
      color: white;
    }

    .hero-title {
      font-size: 4rem;
      font-weight: 300;
      margin-bottom: 2rem;
      font-family: serif;
      letter-spacing: 0.3rem;
    }

    .hero-subtitle {
      font-size: 1.3rem;
      color: rgba(255, 255, 255, 0.95);
      font-weight: 300;
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.8;
    }

    /* 主要内容区域 */
    .main-content {
      background: #fff;
      min-height: 60vh;
      padding: 3rem 0;
      border-radius: 40px 40px 0 0;
      margin-top: -2rem;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 3rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* 最近更新区域 */
    .updates-section {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 10px 40px rgba(124, 77, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .section-title {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #2c2c2c;
      text-align: center;
      position: relative;
      padding-bottom: 1rem;
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: #7c4dff;
      border-radius: 2px;
    }

    /* 文章列表 */
    .article-list {
      list-style: none;
    }

    .article-item {
      margin-bottom: 1.5rem;
      padding: 1.2rem;
      border-radius: 12px;
      background: rgba(124, 77, 255, 0.03);
      border: 1px solid rgba(124, 77, 255, 0.1);
      transition: all 0.3s ease;
    }

    .article-item:hover {
      background: rgba(124, 77, 255, 0.08);
      border-color: rgba(124, 77, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124, 77, 255, 0.15);
    }

    .article-item:last-child {
      margin-bottom: 0;
    }

    .article-link {
      color: #333;
      text-decoration: none;
      font-size: 1.1rem;
      line-height: 1.6;
      display: block;
      transition: color 0.3s ease;
      font-weight: 500;
    }

    .article-link:hover {
      color: #7c4dff;
    }

    /* 作者介绍侧边栏 */
    .author-sidebar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 10px 40px rgba(124, 77, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
      height: fit-content;
    }

    .author-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #2c2c2c;
      text-align: center;
      position: relative;
      padding-bottom: 1rem;
    }

    .author-title::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 3px;
      background: #7c4dff;
      border-radius: 2px;
    }

    .author-content {
      text-align: center;
    }

    .author-description {
      color: #555;
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
      padding: 1.5rem;
      background: rgba(124, 77, 255, 0.05);
      border-radius: 12px;
      border-left: 4px solid #7c4dff;
    }

    .avatar-container {
      margin-bottom: 2rem;
    }

    .avatar {
      width: 120px;
      height: 120px;
      background: #7c4dff;
      border-radius: 50%;
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: white;
      font-weight: 300;
      box-shadow: 0 8px 25px rgba(124, 77, 255, 0.3);
    }

    .contact-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      background: #7c4dff;
      border-radius: 50%;
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(124, 77, 255, 0.3);
    }

    .contact-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(124, 77, 255, 0.4);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #666;
    }

    .empty-state h3 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: #7c4dff;
      font-weight: 300;
    }

    .empty-state p {
      font-size: 1.1rem;
      color: #888;
      line-height: 1.8;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .hero-title {
        font-size: 2.8rem;
        letter-spacing: 0.2rem;
      }
      
      .hero-subtitle {
        font-size: 1.1rem;
        padding: 0 1rem;
      }
      
      .content-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
        padding: 0 15px;
      }
      
      .updates-section,
      .author-sidebar {
        padding: 2rem 1.5rem;
      }
      
      .avatar {
        width: 100px;
        height: 100px;
        font-size: 2rem;
      }
      
      .contact-links {
        gap: 0.8rem;
      }
      
      .contact-link {
        width: 45px;
        height: 45px;
      }
    }
  </style>
</head>
<body>
  
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="navbar-content">
      <div class="navbar-brand">
        <a href="index.html" class="brand-link">徘徊俱乐部</a>
      </div>
      <div class="navbar-links">
        <a href="index.html" class="navbar-link">首页</a>
      </div>
    </div>
  </nav>
  

  <!-- 主标题区域 -->
  <header class="hero-section">
    <div class="container">
      <h1 class="hero-title">徘徊俱乐部</h1>
      <p class="hero-subtitle">记录我想记录的快乐,分享大家喜欢的技术与体验</p>
    </div>
  </header>

  <!-- 主要内容区域 -->
  <main class="main-content">
    <div class="content-grid">
      <!-- 最近更新区域 -->
      <section class="updates-section">
        <h2 class="section-title">最近更新</h2>
        
        
          <ul class="article-list">
            
              <li >
                <a href="i-am-a-chinese-qq.html" >
                  我是中国人qq
                </a>
              </li>
            
          </ul>
        
      </section>
      
      <!-- 作者介绍侧边栏 -->
      <aside class="author-sidebar">
        <h3 class="author-title">作者</h3>
        <div class="author-content">
          <p class="author-description">
            网名：拿着号码牌徘徊。非常优秀的程序员,也是完美的体验家,一生都是学生。
          </p>
        </div>
      </aside>
    </div>
  </main>
</body>
</html>
