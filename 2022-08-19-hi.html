  <style>
    /* 基础样式重置 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background: white;
      min-height: 100vh;
    }

    
    /* 导航栏样式 */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      background: #7c4dff;
      z-index: 1000;
      transition: all 0.3s ease;
      padding: 1rem 0;
    }
    
    .navbar-sticky {
      background: rgba(124, 77, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 0.8rem 0;
    }

    .navbar-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }
    
    .navbar-brand {
      font-size: 1.5rem;
      font-weight: 600;
    }
    
    .brand-link {
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
    }
    
    .brand-logo {
      height: 40px;
      width: auto;
      transition: all 0.3s ease;
    }
    
    .brand-link:hover .brand-logo {
      opacity: 0.8;
      transform: translateY(-1px);
    }

    /* 桌面端导航 */
    .desktop-nav {
      display: flex;
      gap: 2rem;
    }

    .navbar-link {
      color: white;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.3s ease;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      position: relative;
    }

    .navbar-link:hover {
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
    }
    
    /* 移动端汉堡菜单按钮 */
    .mobile-menu-btn {
      display: none;
      flex-direction: column;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    
    .mobile-menu-btn span {
      width: 24px;
      height: 2px;
      background: white;
      transition: all 0.3s ease;
      border-radius: 1px;
    }
    
    .mobile-menu-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    
    /* 汉堡菜单激活动画 */
    .mobile-menu-btn-active span:nth-child(1) {
      transform: rotate(45deg) translate(6px, 6px);
    }
    
    .mobile-menu-btn-active span:nth-child(2) {
      opacity: 0;
    }
    
    .mobile-menu-btn-active span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }
    
    /* 移动端菜单 */
    .mobile-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #7c4dff;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      transform: translateY(-100%);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    
    .mobile-menu-active {
      transform: translateY(0);
      opacity: 1;
      visibility: visible;
    }
    
    .mobile-menu-link {
      display: block;
      color: white;
      text-decoration: none;
      padding: 1rem 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    .mobile-menu-link:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
    }
    
    .mobile-menu-link:last-child {
      border-bottom: none;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .navbar-content {
        padding: 0 1rem;
      }
      
      .desktop-nav {
        display: none;
      }
      
      .mobile-menu-btn {
        display: flex;
      }
      
      .mobile-menu {
        display: block;
      }
      
      .navbar-brand {
        font-size: 1.3rem;
      }
      
      .brand-logo {
        height: 32px;
      }
    }
    
    @media (max-width: 480px) {
      .navbar-content {
        padding: 0 0.8rem;
      }
      
      .navbar-brand {
        font-size: 1.2rem;
      }
      
      .brand-logo {
        height: 28px;
      }
    }
    
    /* 大屏适配 */
    @media (min-width: 1200px) {
      .navbar-content {
        max-width: 1400px;
        padding: 0 3rem;
      }
      
      .navbar-link {
        font-size: 1.1rem;
        padding: 0.6rem 1.2rem;
      }
      
      .brand-logo {
        height: 44px;
      }
    }
    
    @media (min-width: 1600px) {
      .navbar-content {
        max-width: 1600px;
        padding: 0 4rem;
      }
      
      .brand-logo {
        height: 48px;
      }
    }
  

    /* 文章容器 */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 6rem 20px 2rem;
    }

    /* 文章头部 */
    .article-header {
      background: white;
      border-radius: 16px;
      padding: 3rem;
      margin-bottom: 1rem;
    }

    .article-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0;
      color: #2c2c2c;
      line-height: 1.3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .article-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1.5rem;
    }

    .tag {
      background: #7c4dff;
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: transform 0.3s ease;
    }

    .tag:hover {
      transform: translateY(-2px);
    }

    .article-meta {
      font-size: 0.9rem;
      color: #666;
      margin-top: 1rem;
      margin-bottom: 1.5rem;
      text-align: left;
    }

    /* 文章内容 */
    .article-content {
      background: white;
      border-radius: 16px;
      padding: 3rem;
      margin-bottom: 2rem;
      line-height: 1.8;
    }

    .article-content h1,
    .article-content h2,
    .article-content h3,
    .article-content h4,
    .article-content h5,
    .article-content h6 {
      color: #2c2c2c;
      margin: 2rem 0 1rem 0;
      font-weight: 600;
    }

    .article-content h2 {
      font-size: 1.8rem;
      border-left: 4px solid #7c4dff;
      padding-left: 1rem;
    }

    .article-content h3 {
      font-size: 1.5rem;
      color: #7c4dff;
    }

    .article-content p {
      margin-bottom: 1.5rem;
      color: #555;
    }

    .article-content a {
      color: #7c4dff;
      text-decoration: none;
      border-bottom: 1px solid rgba(124, 77, 255, 0.3);
      transition: all 0.3s ease;
    }

    .article-content a:hover {
      color: #5e35b1;
      border-bottom-color: #5e35b1;
    }

    .article-content code {
      background: #f8f9fa;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-family: 'Consolas', 'Monaco', monospace;
      color: #e91e63;
    }

    .article-content pre {
      background: #f8f9fa;
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1.5rem 0;
      border-left: 4px solid #7c4dff;
    }

    .article-content blockquote {
      border-left: 4px solid #7c4dff;
      padding-left: 1.5rem;
      margin: 1.5rem 0;
      font-style: italic;
      color: #666;
      background: rgba(124, 77, 255, 0.05);
      padding: 1rem 1.5rem;
      border-radius: 8px;
    }

    /* 文章底部 */
    .article-footer {
      text-align: center;
      padding: 2rem 0;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: white;
      text-decoration: none;
      background: #7c4dff;
      padding: 1rem 2rem;
      border-radius: 25px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      transform: translateY(-2px);
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .container {
        padding: 1rem 15px;
      }
      
      .article-header,
      .article-content {
        padding: 2rem 1.5rem;
      }
      
      .article-title {
        font-size: 2rem;
      }
      
      .article-meta {
        flex-direction: column;
        gap: 0.5rem;
      }
      
      .tag {
        font-size: 0.8rem;
        padding: 0.3rem 0.8rem;
      }
    }
  </style>

  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="navbar-content">

      <div class="navbar-links desktop-nav">

      <button class="mobile-menu-btn" id="mobileMenuBtn">

  </nav>
  
  <script>
    // 导航栏吸顶效果
    window.addEventListener('scroll', function() {
      const navbar = document.getElementById('navbar');
      if (window.scrollY > 50) {
        navbar.classList.add('navbar-sticky');
      } else {
        navbar.classList.remove('navbar-sticky');
      }
    });
    
    // 移动端菜单切换
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    
    mobileMenuBtn?.addEventListener('click', function() {
      mobileMenu?.classList.toggle('mobile-menu-active');
      mobileMenuBtn?.classList.toggle('mobile-menu-btn-active');
    });
    
    // 点击菜单项关闭移动端菜单
    document.querySelectorAll('.mobile-menu-link').forEach(link => {
      link.addEventListener('click', function() {
        mobileMenu?.classList.remove('mobile-menu-active');
        mobileMenuBtn?.classList.remove('mobile-menu-btn-active');
      });
    });
  </script>

      </div>
      
    </header>
